<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GogãoFitness</title>
<style>
  :root{
    --bg:#eaf4ff;
    --bg2:#dcecff;
    --card:rgba(255,255,255,.95);
    --border:rgba(60,120,200,.12);
    --text:#17324d;
    --muted:#6f859d;
    --primary:#2f7de1;
    --accent:#6c63ff;
    --shadow:0 6px 20px rgba(30,72,120,.08);
    --radius:16px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;
    min-height:100vh;
    overflow-x:hidden;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--text);
    padding:8px 6px 24px 6px;
  }

  .app{
    width:100%;
    max-width:100%;
    margin:0;
    padding:0;
  }

  .topbar,.card{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:12px 12px;
    margin-bottom:10px;
  }

  .topbar{
    background:linear-gradient(135deg,rgba(47,125,225,.12),rgba(108,99,255,.10));
  }

  .brand h1{font-size:22px;letter-spacing:-.03em;margin-bottom:4px}
  .brand p{font-size:12px;color:var(--muted);line-height:1.4}

  .pill{
    display:inline-block;margin-top:10px;padding:7px 10px;border-radius:999px;
    background:rgba(255,255,255,.78);color:var(--primary);font


</head>
<body>
  <div class="app">

    <div class="topbar">
      <div class="brand">
        <h1>GogãoFitness</h1>
        <p>Seu app de dieta, água e treino para celular.</p>
      </div>
      <div class="pill">Calorias • Proteína • Hidratação</div>
    </div>

    <div class="card">
      <div class="card-title">
        <h2>⚖️ Peso & Metas</h2>
        <span>Resumo rápido</span>
      </div>
      <div class="grid-2">
        <div class="field">
          <label>Peso atual (kg)</label>
          <input type="number" id="pesoAtual" placeholder="Ex.: 80">
        </div>
        <div class="field">
          <label>Peso objetivo</label>
          <input type="number" id="pesoMeta" placeholder="Ex.: 75">
        </div>
      </div>
      <div class="grid-2" style="margin-top:8px">
        <div class="field">
          <label>Meta kcal</label>
          <input type="number" id="goalCal" value="2000">
        </div>
        <div class="field">
          <label>Meta proteína (g)</label>
          <input type="number" id="goalProt" value="120">
        </div>
      </div>
      <div class="soft-line"></div>
      <button class="btn" onclick="saveGoals()">Salvar metas</button>
    </div>

    <div class="card">
      <div class="card-title">
        <h2>📊 Resumo do dia</h2>
        <span>Hoje</span>
      </div>
      <div class="stat-row">
        <div class="stat">
          <div class="num" id="calVal">0</div>
          <div class="lbl">kcal consumidas</div>
          <div class="bar"><div id="calBar"></div></div>
        </div>
        <div class="stat">
          <div class="num" id="protVal">0</div>
          <div class="lbl">proteína (g)</div>
          <div class="bar"><div id="protBar"></div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <h2>💧 Água</h2>
        <span>Hidratação diária</span>
      </div>
      <div class="water-wrap">
        <div>
          <div class="water-num"><span id="waterCount">0</span> / <span id="waterGoalLabel">8</span></div>
          <div class="water-sub">copos consumidos</div>
        </div>
        <div class="water-controls">
          <button class="water-btn" onclick="changeWater(-1)">−</button>
          <button class="water-btn" onclick="changeWater(1)">+</button>
        </div>
      </div>
      <div class="bar" style="margin-top:10px">
        <div id="waterBar" style="background:linear-gradient(90deg,#36c2ff,#5ea1ff)"></div>
      </div>
      <div class="grid-2" style="margin-top:10px">
        <div class="field">
          <label>Meta água (copos)</label>
          <input type="number" id="goalWater" value="8">
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn-secondary" style="margin-top:0" onclick="saveGoals()">Salvar água</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <h2>➕ Adicionar alimento</h2>
        <span>Manual</span>
      </div>
      <div class="tabs" id="mealTabs">
        <div class="tab on" data-meal="Café da manhã">Café</div>
        <div class="tab" data-meal="Almoço">Almoço</div>
        <div class="tab" data-meal="Lanche">Lanche</div>
        <div class="tab" data-meal="Jantar">Jantar</div>
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>Nome do alimento</label>
        <input type="text" id="foodName" placeholder="Ex.: Frango grelhado" oninput="upd()">
      </div>
      <div class="grid-2">
        <div class="field">
          <label>Calorias</label>
          <input type="number" id="foodCal" placeholder="0" oninput="upd()">
        </div>
        <div class="field">
          <label>Proteína (g)</label>
          <input type="number" id="foodProt" placeholder="0" oninput="upd()">
        </div>
      </div>
      <div class="hint" id="hint"></div>
      <button class="btn-secondary hidden" id="btnSaveFood" onclick="saveToMyFoods()">⭐ Salvar no meu banco</button>
      <button class="btn" onclick="addFood()">➕ Adicionar ao dia</button>
    </div>

    <div class="card">
      <div class="card-title">
        <h2>⭐ Meu Banco de Alimentos</h2>
        <span id="bankCount">0 itens</span>
      </div>
      <div id="bankList"></div>
    </div>

    <div class="card">
      <div class="card-title">
        <h2>📋 Alimentos de hoje</h2>
        <span id="todayCount">0 itens</span>
      </div>
      <div id="dayList"></div>
    </div>

  </div>
<script>
  let goals = {cal:2000,prot:120,water:8};
  let myFoods = [];
  let dayFoods = [];
  let water = 0;
  let meal = 'Café da manhã';

  const $ = id => document.getElementById(id);

  const savedGoals = localStorage.getItem('gfg_goals');
  if(savedGoals) goals = JSON.parse(savedGoals);
  const savedFoods = localStorage.getItem('gfg_myFoods');
  if(savedFoods) myFoods = JSON.parse(savedFoods);
  const savedDay = localStorage.getItem('gfg_dayFoods');
  if(savedDay) dayFoods = JSON.parse(savedDay);
  const savedWater = localStorage.getItem('gfg_water');
  if(savedWater) water = JSON.parse(savedWater);

  $('goalCal').value = goals.cal;
  $('goalProt').value = goals.prot;
  $('goalWater').value = goals.water;
  $('waterGoalLabel').textContent = goals.water;

  document.querySelectorAll('#mealTabs .tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('#mealTabs .tab').forEach(t => t.classList.remove('on'));
      tab.classList.add('on');
      meal = tab.dataset.meal;
    });
  });

  function saveGoals(){
    const cal = +$('goalCal').value || 0;
    const prot = +$('goalProt').value || 0;
    const w = +$('goalWater').value || 8;
    if(cal < 100 || prot < 10 || w < 1) return;
    goals = {cal, prot, water: w};
    localStorage.setItem('gfg_goals', JSON.stringify(goals));
    $('waterGoalLabel').textContent = goals.water;
    render();
  }

  function changeWater(delta){
    water = Math.max(0, Math.min(goals.water * 2, water + delta));
    localStorage.setItem('gfg_water', JSON.stringify(water));
    renderSummary();
  }

  function upd(){
    const n = $('foodName').value.trim();
    const c = +$('foodCal').value || 0;
    const p = +$('foodProt').value || 0;
    $('hint').textContent = (n || c || p)
      ? `Total: ${Math.round(c)} kcal | ${Math.round(p*10)/10}g prot` : '';
    const exists = myFoods.some(x => x.n.toLowerCase() === n.toLowerCase());
    $('btnSaveFood').classList.toggle('hidden', !(n && !exists));
  }

  function saveToMyFoods(){
    const n = $('foodName').value.trim();
    const c = +$('foodCal').value || 0;
    const p = +$('foodProt').value || 0;
    if(!n || myFoods.some(x => x.n.toLowerCase() === n.toLowerCase())) return;
    myFoods.push({n, cal:c, prot:p});
    myFoods.sort((a,b) => a.n.localeCompare(b.n,'pt'));
    localStorage.setItem('gfg_myFoods', JSON.stringify(myFoods));
    $('foodName').value = ''; $('foodCal').value = ''; $('foodProt').value = '';
    upd(); renderBank();
  }

  function addFood(){
    const n = $('foodName').value.trim();
    const c = +$('foodCal').value || 0;
    const p = +$('foodProt').value || 0;
    if(!n) return;
    dayFoods.push({
      id: Date.now(), n, c, p, meal,
      t: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    });
    localStorage.setItem('gfg_dayFoods', JSON.stringify(dayFoods));
    $('foodName').value = ''; $('foodCal').value = ''; $('foodProt').value = '';
    upd(); renderDay(); renderSummary();
  }

  function delBank(name){
    myFoods = myFoods.filter(x => x.n !== name);
    localStorage.setItem('gfg_myFoods', JSON.stringify(myFoods));
    renderBank(); upd();
  }

  function delDay(id){
    dayFoods = dayFoods.filter(x => x.id !== id);
    localStorage.setItem('gfg_dayFoods', JSON.stringify(dayFoods));
    renderDay(); renderSummary();
  }

  function totals(list){
    return list.reduce((acc,x) => {
      acc.cal += (x.c||0); acc.prot += (x.p||0); return acc;
    },{cal:0,prot:0});
  }

  function renderSummary(){
    const t = totals(dayFoods);
    $('calVal').textContent = Math.round(t.cal);
    $('protVal').textContent = Math.round(t.prot*10)/10;
    $('waterCount').textContent = water;
    $('waterGoalLabel').textContent = goals.water;
    const calPct = goals.cal ? Math.min((t.cal/goals.cal)*100,100) : 0;
    const protPct = goals.prot ? Math.min((t.prot/goals.prot)*100,100) : 0;
    const waterPct = goals.water ? Math.min((water/goals.water)*100,100) : 0;
    $('calBar').style.width = calPct+'%';
    $('protBar').style.width = protPct+'%';
    $('waterBar').style.width = waterPct+'%';
  }

  function renderBank(){
    $('bankCount').textContent = myFoods.length+' itens';
    if(!myFoods.length){
      $('bankList').innerHTML = '<div class="subtle">Seu banco ainda está vazio.</div>'; return;
    }
    $('bankList').innerHTML = myFoods.map(x => `
      <div class="mini-row">
        <div><b>${x.n}</b><br><span>${Math.round(x.cal)} kcal • ${Math.round(x.prot*10)/10}g prot</span></div>
        <button class="del-btn" onclick="delBank('${x.n.replace(/'/g,"\\'")}')">✕</button>
      </div>`).join('');
  }

  function renderDay(){
    $('todayCount').textContent = dayFoods.length+' itens';
    if(!dayFoods.length){
      $('dayList').innerHTML = '<div class="subtle">Nenhum alimento adicionado hoje.</div>'; return;
    }
    $('dayList').innerHTML = dayFoods.map(x => `
      <div class="mini-row">
        <div>
          <b>${x.n}</b><br>
          <span>${x.meal} • ${x.t} • ${Math.round(x.c)} kcal • ${Math.round(x.p*10)/10}g prot</span>
        </div>
        <button class="del-btn" onclick="delDay(${x.id})">✕</button>
      </div>`).join('');
  }

  function render(){
    renderSummary(); renderBank(); renderDay(); upd();
  }

  render();
</script>
</body>
</html>
